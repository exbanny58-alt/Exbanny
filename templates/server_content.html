<!-- Управление сервером -->
<div class="server-content-wrapper">
    <div class="server-header">
        <h1>
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                <line x1="8" y1="21" x2="16" y2="21"/>
                <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
            Управление сервером
        </h1>
    </div>

    <!-- Статистика -->
    <div class="server-stats" id="serverStats">
        <div class="stat-card">
            <span class="stat-number" id="serverStatus">⏹️</span>
            <span class="stat-label">Статус сервера</span>
        </div>
        <div class="stat-card">
            <span class="stat-number" id="playersCount">0</span>
            <span class="stat-label">Игроков онлайн</span>
        </div>
        <div class="stat-card">
            <span class="stat-number" id="uptimeCount">0ч</span>
            <span class="stat-label">Время работы</span>
        </div>
    </div>

    <!-- Панель управления -->
    <div class="server-toolbar">
        <button class="btn btn-server-start" id="startServerBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5,3 19,12 5,21"/>
            </svg>
            Запустить сервер
        </button>
        <button class="btn btn-server-stop" id="stopServerBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            </svg>
            Остановить сервер
        </button>
        <button class="btn btn-server-restart" id="restartServerBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23,4 23,10 17,10"/>
                <path d="M21,12a9,9,0,0,0-5.5-8.2,9,9,0,0,0-11,3.7"/>
                <polyline points="1,20 1,14 7,14"/>
                <path d="M3,12a9,9,0,0,0,5.5,8.2,9,9,0,0,0,11-3.7"/>
            </svg>
            Перезапустить
        </button>
        <div class="server-filter">
            <button class="btn btn-secondary" id="openServerLogsBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14,2H6A2,2,0,0,0,4,4V20a2,2,0,0,0,2,2H18a2,2,0,0,0,2-2V8Z"/>
                    <polyline points="14,2 14,8 20,8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <polyline points="10,9 9,9 8,9"/>
                </svg>
                Логи сервера
            </button>
        </div>
    </div>

    <!-- Информация о сервере -->
    <div class="server-info-grid">
        <div class="server-info-card">
            <div class="server-info-header">
                <span class="server-info-icon">🌐</span>
                <span class="server-info-title">IP адрес</span>
            </div>
            <div class="server-info-value" id="serverIP">--.--.--.--:2302</div>
        </div>
        <div class="server-info-card">
            <div class="server-info-header">
                <span class="server-info-icon">📋</span>
                <span class="server-info-title">Название сервера</span>
            </div>
            <div class="server-info-value" id="serverName">DayZ Сервер</div>
        </div>
        <div class="server-info-card">
            <div class="server-info-header">
                <span class="server-info-icon">👥</span>
                <span class="server-info-title">Макс. игроков</span>
            </div>
            <div class="server-info-value" id="serverMaxPlayers">60</div>
        </div>
        <div class="server-info-card">
            <div class="server-info-header">
                <span class="server-info-icon">⏱️</span>
                <span class="server-info-title">Версия</span>
            </div>
            <div class="server-info-value" id="serverVersion">1.24.xxx</div>
        </div>
    </div>

    <!-- Консоль сервера (логи в реальном времени) -->
    <div class="server-console">
        <div class="server-console-header">
            <span class="server-console-title">📟 Консоль сервера</span>
            <div class="server-console-actions">
                <button class="btn btn-clear-console" id="clearConsoleBtn">Очистить</button>
                <button class="btn btn-auto-scroll" id="toggleAutoScrollBtn">Автоскролл</button>
            </div>
        </div>
        <div class="server-console-output" id="consoleOutput">
            <div class="console-line console-info">[Система] Консоль сервера готова к работе</div>
            <div class="console-line console-info">[Система] Ожидание команд...</div>
        </div>
        <div class="server-console-input">
            <input type="text" id="consoleInput" placeholder="Введите команду..." class="console-input">
            <button class="btn btn-send-command" id="sendCommandBtn">Отправить</button>
        </div>
    </div>
</div>
