<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DayZ Менеджер</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/all.min.css') }}" />
    <!-- Подключаем CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
    <!-- Основной контейнер -->
    <main>
        <!-- Боковое меню -->
        <nav class="main-menu">
            <div class="menu-top">
                <ul>
                    <li class="nav-item">
                        <a href="#" onclick="showContent('server')">
                            <i class="fa fa-server nav-icon"></i>
                            <span class="nav-text">Управление сервером</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" onclick="showContent('game')">
                            <i class="fa fa-gamepad nav-icon"></i>
                            <span class="nav-text">Управление игрой</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" onclick="showContent('mods')">
                            <i class="fa fa-folder nav-icon"></i>
                            <span class="nav-text">Управление модами</span>
                        </a>
                    </li>
                </ul>
            </div>

            <div class="menu-bottom">
                <ul>
                    <li class="nav-item">
                        <a href="#" onclick="showSettings()">
                            <i class="fa fa-gear nav-icon"></i>
                            <span class="nav-text">Настройки</span>
                        </a>
                    </li>
                </ul>
            </div>
        </nav>

        <!-- Основной контент -->
        <section class="content">
            <div class="content-area" id="contentArea">
                <!-- Стартовая страница-заглушка -->
                <div id="startPage" class="start-page">
                    <div class="start-content">
                        <div class="start-logo">
                            <i class="fa fa-shield-halved"></i>
                        </div>
                        <h1>DayZ Менеджер</h1>
                        <p>Выберите раздел в меню слева</p>
                        <div class="start-hint">
                            <span class="hint-dot"></span>
                            <span class="hint-dot"></span>
                            <span class="hint-dot"></span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script src="{{ url_for('static', filename='js/settings.js') }}"></script>
</body>
</html>
