<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DayZ Менеджер</title>
    
    <!-- Подключаем CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
    <!-- Основной контейнер -->
    <main>
        <!-- Боковое меню -->
        <nav class="main-menu">
            <div class="menu-top">
                <!-- Блок с основными пунктами меню (с обводкой) -->
                <div class="menu-block">
                    <ul>
                        <li class="nav-item">
                            <a href="#" onclick="showContent('server', event)">
                                <!-- Иконка сервера -->
                                <svg class="nav-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                                    <line x1="8" y1="21" x2="16" y2="21"/>
                                    <line x1="12" y1="17" x2="12" y2="21"/>
                                </svg>
                                <span class="nav-text">Управление сервером</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="#" onclick="showContent('game', event)">
                                <!-- Иконка игры (геймпад) -->
                                <svg class="nav-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polygon points="5,3 19,12 5,21"/>
                                </svg>
                                <span class="nav-text">Управление игрой</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="#" onclick="showContent('mods', event)">
                                <!-- Иконка папки -->
                                <svg class="nav-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M22,19a2,2,0,0,1-2,2H4a2,2,0,0,1-2-2V5A2,2,0,0,1,4,3H9l2,3h9a2,2,0,0,1,2,2Z"/>
                                </svg>
                                <span class="nav-text">Управление модами</span>
                            </a>
                        </li>
                        <!-- НОВЫЙ ПУНКТ: STEAMCMD -->
                        <li class="nav-item">
                            <a href="#" onclick="showContent('steamcmd', event)">
                                <!-- Иконка Steam -->
                                <svg class="nav-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"/>
                                    <path d="M8 12a4 4 0 1 0 8 0 4 4 0 0 0-8 0z"/>
                                    <path d="M12 8v4l2 2"/>
                                </svg>
                                <span class="nav-text">SteamCMD</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="menu-bottom">
                <!-- Декоративный разделитель -->
                <div class="menu-divider"></div>
                
                <!-- НОВЫЙ БЛОК МЕНЮ С КНОПКАМИ УПРАВЛЕНИЯ -->
                <div class="menu-block">
                    <ul>
                        <li class="nav-item">
                            <a href="#" onclick="controlServer('start', event)" class="control-btn control-start">
                                <!-- Иконка запуска -->
                                <svg class="nav-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polygon points="5,3 19,12 5,21"/>
                                </svg>
                                <span class="nav-text">Запуск сервера</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="#" onclick="controlServer('restart', event)" class="control-btn control-restart">
                                <!-- Иконка перезапуска -->
                                <svg class="nav-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="23,4 23,10 17,10"/>
                                    <path d="M21,12a9,9,0,0,0-5.5-8.2,9,9,0,0,0-11,3.7"/>
                                    <polyline points="1,20 1,14 7,14"/>
                                    <path d="M3,12a9,9,0,0,0,5.5,8.2,9,9,0,0,0,11-3.7"/>
                                </svg>
                                <span class="nav-text">Перезапуск сервера</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="#" onclick="controlServer('stop', event)" class="control-btn control-stop">
                                <!-- Иконка остановки -->
                                <svg class="nav-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                </svg>
                                <span class="nav-text">Остановка сервера</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="#" onclick="controlGame('start', event)" class="control-btn control-game-start">
                                <!-- Иконка запуска игры -->
                                <svg class="nav-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polygon points="5,3 19,12 5,21"/>
                                </svg>
                                <span class="nav-text">Запуск игры</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="#" onclick="controlGame('stop', event)" class="control-btn control-game-stop">
                                <!-- Иконка остановки игры -->
                                <svg class="nav-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                </svg>
                                <span class="nav-text">Остановка игры</span>
                            </a>
                        </li>
                    </ul>
                </div>
                
                <!-- Блок с настройками -->
                <div class="menu-block-settings">
                    <ul>
                        <li class="nav-item">
                            <a href="#" onclick="showSettings(event)">
                                <!-- Иконка настроек (шестеренка) -->
                                <svg class="nav-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                                <span class="nav-text">Настройки</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <!-- Основной контент -->
        <section class="content">
            <div class="content-area" id="contentArea">
                <!-- Стартовая страница-заглушка -->
                <div id="startPage" class="start-page">
                    <div class="start-content">
                        <div class="start-logo">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                                <polyline points="9 12 11 14 15 10"/>
                            </svg>
                        </div>
                        <h1>DayZ Менеджер</h1>
                        <p>Выберите раздел в меню слева</p>
                        <div class="start-hint">
                            <span class="hint-dot"></span>
                            <span class="hint-dot"></span>
                            <span class="hint-dot"></span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    
<script src="{{ url_for('static', filename='js/notifications.js') }}"></script>
<script src="{{ url_for('static', filename='js/settings.js') }}"></script>
<script src="{{ url_for('static', filename='js/mods.js') }}"></script>
<script src="{{ url_for('static', filename='js/server.js') }}"></script>
<script src="{{ url_for('static', filename='js/game.js') }}"></script>
<script src="{{ url_for('static', filename='js/controls.js') }}"></script>
<script src="{{ url_for('static', filename='js/console.js') }}"></script>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</html>
