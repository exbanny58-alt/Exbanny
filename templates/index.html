<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DayZ Менеджер</title>
    
    <!-- Font Awesome (локально) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/all.min.css') }}" />
    <!-- Подключаем CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
    <!-- Основной контейнер -->
    <main>
        <!-- Боковое меню -->
        <nav class="main-menu">
            <div class="menu-top">
                <ul>
                    <li class="nav-item">
                        <a href="#">
                            <i class="fa fa-server nav-icon"></i>
                            <span class="nav-text">Управление сервером</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#">
                            <i class="fa fa-gamepad nav-icon"></i>
                            <span class="nav-text">Управление игрой</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#">
                            <i class="fa fa-folder nav-icon"></i>
                            <span class="nav-text">Управление модами</span>
                        </a>
                    </li>
                </ul>
            </div>

            <div class="menu-bottom">
                <ul>
                    <li class="nav-item">
                        <a href="#" onclick="openSettings()">
                            <i class="fa fa-gear nav-icon"></i>
                            <span class="nav-text">Настройки</span>
                        </a>
                    </li>
                </ul>
            </div>
        </nav>

        <!-- Пустая область контента -->
        <section class="content">
            <div class="left-content">
                <!-- Здесь будет контент -->
            </div>
        </section>

        <!-- Настройки системы -->
        {% include 'settings.html' %}
    </main>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script src="{{ url_for('static', filename='js/settings.js') }}"></script>
</body>
</html>
